name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# SEC-002: Minimum required permissions
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dev dependencies
        run: pip install -e '.[dev]'

      - name: Ruff lint
        run: ruff check mcp-server/ tests/ scripts/

      - name: Black format check
        run: black --check mcp-server/ tests/ scripts/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -e '.[dev]'

      - name: Check version consistency (LT-4)
        run: python scripts/check_version_sync.py

      - name: Check mcp.json freshness (LT-1)
        run: python scripts/generate_mcp_registry.py --check

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=mcp-server --cov-fail-under=70 --junitxml=test-results.xml
