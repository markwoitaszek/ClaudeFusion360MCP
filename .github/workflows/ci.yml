name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# SEC-002: Minimum required permissions
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dev dependencies
        run: pip install ruff black

      - name: Ruff lint
        run: ruff check mcp-server/ tests/

      - name: Black format check
        run: black --check mcp-server/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pytest pytest-cov

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=mcp-server --cov-fail-under=50 --junitxml=test-results.xml
